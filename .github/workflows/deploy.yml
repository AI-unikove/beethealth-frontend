name: Deploy Frontend Build

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install Dependencies
      - name: Install Dependencies
        run: npm install

      # Generate .env file
      - name: Generate .env
        run: |
          cp env.template .env

      # Build Application
      - name: Build Application
        run: npm run build

      # Verify GitHub Secrets are available
      - name: Verify Secrets
        run: |
          echo "HOST exists: ${{ secrets.HOST != '' }}"
          echo "USERNAME exists: ${{ secrets.USERNAME != '' }}"
          echo "PORT exists: ${{ secrets.PORT != '' }}"
          echo "SSH_KEY exists: ${{ secrets.SSH_KEY != '' }}"
          echo "APP_PATH exists: ${{ secrets.APP_PATH != '' }}"

      # Test SSH Connection
      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            echo "SSH Connection Successful"
            whoami
            pwd
            ls -la